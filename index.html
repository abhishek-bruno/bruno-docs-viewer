<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://www.usebruno.com/favicon.ico" />
    <title>Shared Collection · Bruno</title>
    <style>
      /* Instant feedback before the app bundle loads. React replaces #app. */
      #app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
      }
      #app-boot .boot-spinner {
        width: 2.25rem;
        height: 2.25rem;
        border: 3px solid #e5e7eb;
        border-top-color: hsl(33, 80%, 46%);
        border-radius: 50%;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-boot"><div class="boot-spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
