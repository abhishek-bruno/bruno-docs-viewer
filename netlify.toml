[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/postman-import"
  to = "/.netlify/functions/postman-import"
  status = 200
  force = true

[[redirects]]
  from = "/api/git-import"
  to = "/.netlify/functions/git-import"
  status = 200
  force = true

# SPA fallback: any non-file path (e.g. /<source-url>) serves the app, which
# routes on the pathname. Placed last + no force, so functions and real assets
# still resolve first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
